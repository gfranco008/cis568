<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECharts Tree of the Data</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <main class="page">
    <header class="intro">
      <p class="eyebrow">ECharts Visualizations:</p>
      <h1>Tree Views of the Data</h1>
      <p class="subtitle">Start on the tree tab, then switch to the treemap tab to compare the same hierarchy in two layouts.</p>
    </header>

    <section class="card">
      <div class="tab-bar" role="tablist" aria-label="Visualization views">
        <button class="tab is-active" type="button" role="tab" aria-selected="true" data-view="tree">Tree</button>
        <button class="tab" type="button" role="tab" aria-selected="false" data-view="treemap">TreeMap</button>
      </div>
      <div id="chart-view" class="chart-container"></div>
    </section>
  </main>

  <script src="network.js"></script>
</body>
</html>
